<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>同じ位置に画像を重ねる</title>
</head>
<body>

<div style="position: relative; width: 480px; height: 374px;">
  <img src="./bg0.png" style="position: absolute; left: 0; top: 0;">
  <img src="./bg1.png" style="position: absolute; left: 0; top: 0;">
  <div style="position: absolute; left: 20px; top: 50px; background: #fef3c7; padding: 6px;color: magenta;font-size:     20px;font-weight: bold;">ぽかぽか陽気の穏やかな朝<br>花畑では、蝶々がのんびり飛んでいます</div>
  <img src="./butterfly.gif" style="position: absolute; left: 400px; top: 400px;">
  <img src="./butterfly.gif" style="position: absolute; left: 200px; top: 250px;">
  <img src="./butterfly.gif" style="position: absolute; left: 580px; top: 380px;">
</div>

</body>
</html>
